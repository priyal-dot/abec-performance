<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ABEC. PP Analysis</title>
<style>
:root { --bg:#f4f6f9; --card:#fff; --border:#e3e7ec; --text:#1a1e24; --muted:#606771;
 --lime:#c6f24e; --green:#5b8a00; --down:#e23c4a; --up:#12b39a; --amber:#e0951a; --redbg:#fdf0f1; }
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;background:var(--bg);color:var(--text);
 font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif;
 font-size:14px;line-height:1.45}
.wrap{max-width:1100px;margin:0 auto;padding:14px 18px 84px}
.appbar{display:flex;align-items:baseline;gap:8px;margin:4px 2px 14px}
.appbar h1{font-size:20px;margin:0;font-weight:800;letter-spacing:-.3px}
.appbar h1 .dot{color:var(--lime);-webkit-text-stroke:.5px var(--green)}
.appbar small{font-size:11.5px;font-weight:600;color:var(--muted)}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:14px}
h3{margin:0 0 10px;font-size:18px}
.sub{color:var(--muted);font-size:12px;margin-bottom:14px}
/* ---- year chart ---- */
.ywrap{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;align-items:end;height:calc(100vh - 270px);min-height:340px;padding-top:6px}
.ycol{display:flex;flex-direction:column;align-items:center;height:100%;min-width:0}
.yval{font-size:13px;font-weight:800;margin-bottom:6px;font-variant-numeric:tabular-nums;white-space:nowrap}
.ybarwrap{flex:1;width:100%;display:flex;flex-direction:column;align-items:center;justify-content:flex-end}
.ybar{width:68%;background:var(--down);border-radius:4px 4px 0 0;min-height:3px}
.ylab{margin-top:9px;font-weight:800;font-size:16px}
.ysub{color:var(--muted);font-size:10.5px;white-space:nowrap}
/* ---- RM picker ---- */
.controls{display:flex;gap:8px;margin-bottom:12px}
.navbtn{width:40px;height:40px;border-radius:10px;border:1px solid var(--border);background:#fff;
 font-size:19px;cursor:pointer;color:var(--text);display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.navbtn:active{background:var(--bg)}
select{flex:1;min-width:0;padding:8px 12px;border-radius:10px;border:1px solid var(--border);
 font-size:14px;background:#fff;color:var(--text)}
.idcard{display:flex;align-items:center;gap:12px}
.avatar{width:46px;height:46px;border-radius:13px;flex:0 0 auto;background:linear-gradient(135deg,var(--lime),var(--up));
 color:#0f2a22;font-weight:800;font-size:20px;display:flex;align-items:center;justify-content:center}
.idname{font-size:16px;font-weight:700}
.idmeta{color:var(--muted);font-size:11.5px;margin-top:1px}
.idimpact{margin-left:auto;text-align:right}
.idimpact .v{font-size:18px;font-weight:800;color:var(--down);letter-spacing:-.3px;white-space:nowrap}
.idimpact .l{font-size:9.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;font-weight:600}
.searchbox{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:10px;font-size:13.5px;margin-bottom:12px}
/* ---- company accordion ---- */
.comp{border:1px solid var(--border);border-radius:11px;margin-bottom:8px;overflow:hidden;background:#fff}
.comphead{display:flex;align-items:center;gap:8px;padding:10px 12px;cursor:pointer;border-left:4px solid var(--down)}
.comphead:active{background:var(--bg)}
.compname{font-weight:700;font-size:13px;flex:1;min-width:0}
.compmeta{color:var(--muted);font-size:10.5px;font-weight:600;margin-top:1px}
.compimp{font-weight:800;font-size:13px;color:var(--down);white-space:nowrap;font-variant-numeric:tabular-nums}
.chev{color:var(--muted);font-size:12px;transition:transform .15s;flex:0 0 auto}
.comp.open .chev{transform:rotate(90deg)}
.compbody{display:none;border-top:1px solid var(--border);overflow-x:auto}
.comp.open .compbody{display:block}
table{width:100%;border-collapse:collapse;font-size:13.5px}
th{text-align:right;padding:8px 7px;border-bottom:1px solid var(--border);color:var(--muted);
 font-weight:600;white-space:nowrap;background:#fbfcfd;font-size:13px}
th:first-child{text-align:left}
td{padding:8px 7px;border-bottom:1px solid var(--border);text-align:right;white-space:nowrap;font-variant-numeric:tabular-nums}
td:first-child{text-align:left;font-weight:700}
tr:last-child td{border-bottom:none}
td.below{color:var(--down);font-weight:700}
.count{color:var(--muted);font-size:12px;margin:2px 2px 10px}
/* ---- bottom nav ---- */
.tabbar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);
 display:flex;padding-bottom:env(safe-area-inset-bottom);z-index:10}
.tab{flex:1;padding:11px 0 9px;text-align:center;cursor:pointer;color:var(--muted);font-size:11px;font-weight:600}
.tab .ic{font-size:19px;display:block;margin-bottom:1px}
.tab.active{color:var(--green)}
.view{display:none}.view.active{display:block}
.more{width:100%;padding:10px;border:1px dashed var(--border);border-radius:11px;background:#fff;
 color:var(--muted);font-weight:700;font-size:13px;cursor:pointer;margin-top:2px}
@media(min-width:700px){.yval{font-size:18px}.ylab{font-size:19px}.ybar{width:56%}h3{font-size:21px}.appbar h1{font-size:24px}.card{padding:22px}
table{font-size:16px}th{font-size:14.5px;padding:10px 9px}td{padding:10px 9px}}
</style></head><body>

function compactINR(n){
  const sign = n < 0 ? '-' : '';
  const a = Math.abs(n);
  let s;
  if (a >= 1e7) s = (a/1e7).toFixed(2).replace(/\.?0+$/,'') + ' Cr';
  else if (a >= 1e5) s = (a/1e5).toFixed(2).replace(/\.?0+$/,'') + ' L';
  else if (a >= 1e3) s = (a/1e3).toFixed(1).replace(/\.?0+$/,'') + 'k';
  else s = Math.round(a).toLocaleString('en-IN');
  return sign + '\u20B9' + s;
}
function inr(n){ return '\u20B9' + Math.round(n).toLocaleString('en-IN'); }

/* ---- tabs ---- */
document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => {
  document.querySelectorAll('.tab').forEach(x => x.classList.toggle('active', x === t));
  document.querySelectorAll('.view').forEach(v => v.classList.toggle('active', v.id === t.dataset.view));
  window.scrollTo(0,0);
}));

/* ---- overview: impact by year ---- */
(function(){
  const years = DATA.years;
  const max = Math.max(...Object.values(years).map(v => v[0]));
  document.getElementById('yWrap').innerHTML = Object.entries(years).map(([y,[imp,nd]]) => `
    <div class="ycol">
      <div class="ybarwrap"><div class="yval">${compactINR(imp)}</div><div class="ybar" style="height:${(imp/max*100).toFixed(0)}%"></div></div>
      <div class="ylab">${y}</div>
    </div>`).join('');
})();

/* ---- PP analysis ---- */
const EMPS = DATA.emps;   // [name, full, desig, loc, impact, clients]
let curIdx = 0;
const PAGE = 30;
let shown = PAGE;
const els = {
  sel: document.getElementById('empSelect'),
  avatar: document.getElementById('avatar'),
  idName: document.getElementById('idName'),
  idMeta: document.getElementById('idMeta'),
  idImpact: document.getElementById('idImpact'),
  search: document.getElementById('exSearch'),
  list: document.getElementById('compList'),
  count: document.getElementById('countLine'),
};
els.sel.innerHTML = EMPS.map((e,i) => `<option value="${i}">${e[0]}</option>`).join('');

function dealRows(deals){
  return deals.slice().sort((a,b) => b[5] - a[5]).map(d => `
    <tr>
      <td>${d[0]}</td>
      <td class="below">${inr(d[1])}</td>
      <td>${inr(d[2])}</td>
      <td>${d[3].toLocaleString('en-IN')}</td>
      <td>${compactINR(d[4])}</td>
      <td class="below">${compactINR(d[5])}</td>
    </tr>`).join('');
}

function render(){
  const e = EMPS[curIdx];
  els.avatar.textContent = e[0].charAt(0).toUpperCase();
  els.idName.textContent = e[1];
  els.idMeta.textContent = e[2] + ' \u00B7 ' + e[3];
  els.idImpact.textContent = compactINR(e[4]);
  const q = els.search.value.trim().toLowerCase();
  const clients = e[5].filter(c => c[0].toLowerCase().includes(q));
  els.count.textContent = clients.length + ' compan' + (clients.length === 1 ? 'y' : 'ies') +
    (q ? ' matching' : ' flagged') + ' \u00B7 tap to see deals';
  const slice = clients.slice(0, shown);
  els.list.innerHTML = slice.map((c,i) => `
    <div class="comp" data-i="${i}">
      <div class="comphead">
        <div style="flex:1;min-width:0">
          <div class="compname">${c[0]}</div>
          <div class="compmeta">${c[2].length} deal${c[2].length===1?'':'s'}</div>
        </div>
        <div class="compimp">${compactINR(c[1])}</div>
        <div class="chev">&#9654;</div>
      </div>
      <div class="compbody">
        <table>
          <thead><tr><th>Edition</th><th>Rate/SQM</th><th>Disc. rate</th><th>SQM</th><th>Deal \u20B9</th><th>Impact \u20B9</th></tr></thead>
          <tbody>${dealRows(c[2])}</tbody>
        </table>
      </div>
    </div>`).join('') +
    (clients.length > shown ? `<button class="more" id="moreBtn">Show ${Math.min(PAGE, clients.length - shown)} more of ${clients.length - shown}</button>` : '');
  els.list.querySelectorAll('.comphead').forEach(h => h.addEventListener('click', () => {
    h.parentElement.classList.toggle('open');
  }));
  const mb = document.getElementById('moreBtn');
  if (mb) mb.addEventListener('click', () => { shown += PAGE; render(); });
}
els.sel.addEventListener('change', () => { curIdx = +els.sel.value; shown = PAGE; els.search.value=''; render(); });
document.getElementById('prevBtn').addEventListener('click', () => {
  curIdx = (curIdx - 1 + EMPS.length) % EMPS.length; els.sel.value = String(curIdx); shown = PAGE; render();
});
document.getElementById('nextBtn').addEventListener('click', () => {
  curIdx = (curIdx + 1) % EMPS.length; els.sel.value = String(curIdx); shown = PAGE; render();
});
els.search.addEventListener('input', () => { shown = PAGE; render(); });
render();
</script>
